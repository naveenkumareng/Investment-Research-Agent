services:
  - type: web
    name: investment-research-api
    plan: free
    buildCommand: mvn clean package -DskipTests -f springboot-backend/pom.xml
    startCommand: java -Xmx512m -jar springboot-backend/target/investment-research-api-1.0.0.jar
    envVars:
      - key: MONGODB_URI
        value: mongodb+srv://investa2026:investor@2003@cluster0.mongodb.net/investa?retryWrites=true&w=majority
      - key: JWT_SECRET
        value: your-super-secret-key-minimum-256-bits-long-generate-a-random-string-here
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: "-Xmx512m"


  - type: web
    name: investment-research-frontend
    env: static
    plan: free
    buildCommand: cd "Investment Research Agent" && npm install && npm run build
    staticPublishPath: "Investment Research Agent/dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: investment-research-api
          envVarKey: RENDER_EXTERNAL_URL
