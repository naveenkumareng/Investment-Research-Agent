<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0f172a"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Upward trending line chart -->
  <g transform="translate(20, 50)">
    <!-- Chart background -->
    <rect x="0" y="0" width="60" height="50" fill="none" opacity="0.1"/>
    
    <!-- Grid lines -->
    <line x1="0" y1="10" x2="60" y2="10" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="20" x2="60" y2="20" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="30" x2="60" y2="30" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="40" x2="60" y2="40" stroke="#475569" stroke-width="0.5" opacity="0.3"/>
    
    <!-- Trending line with gradient -->
    <polyline points="0,35 15,25 30,15 45,8 60,0" 
              fill="none" 
              stroke="url(#grad1)" 
              stroke-width="2.5" 
              stroke-linecap="round" 
              stroke-linejoin="round"/>
    
    <!-- Area under line -->
    <polygon points="0,35 15,25 30,15 45,8 60,0 60,50 0,50" 
             fill="url(#grad2)" 
             opacity="0.2"/>
  </g>
  
  <!-- Dollar symbol accent -->
  <g transform="translate(70, 15)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
    <text x="8" y="11" font-size="10" font-weight="bold" fill="url(#grad1)" text-anchor="middle" opacity="0.8">$</text>
  </g>
  
  <!-- Sparkle accent (top right) -->
  <g transform="translate(80, 10)">
    <circle cx="0" cy="0" r="1.5" fill="#3b82f6" opacity="0.8"/>
    <circle cx="0" cy="0" r="1" fill="#3b82f6" opacity="0.4"/>
  </g>
</svg>
